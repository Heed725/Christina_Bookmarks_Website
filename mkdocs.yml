site_name: Christina's Bookmarks
site_description: A curated collection of bookmarks organized by topic - GIS, Remote Sensing, Conservation, and more.
site_author: Christina Mapunda
site_url: https://Heed725.github.io/Christina_Bookmarks_Website/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    logo: material/bookmark-multiple
  features:
    - search.suggest
    - search.highlight
    - search.share
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.tabs.link

plugins:
  - search:
      separator: '[\s\-\.]+'

markdown_extensions:
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/christina-mapunda-316074173/
    - icon: fontawesome/brands/github
      link: https://github.com/Heed725

nav:
  - Home: index.md
  - GIS & Mapping:
    - GIS & Remote Sensing: gis-remote-sensing.md
    - Google Earth Engine: google-earth-engine.md
    - Remote Sensing: remote-sensing.md
    - ArcGIS & Web GIS: arcgis-web-gis.md
    - OpenStreetMap: openstreetmap.md
  - Data Sources:
    - Geospatial Data Sources: geospatial-data-sources.md
  - Conservation:
    - Conservation & Wildlife: conservation-wildlife.md
    - Human-Wildlife Conflict: human-wildlife-conflict.md
  - Academic:
    - Academic Resources: academic-resources.md
    - Learning & Tutorials: learning-tutorials.md
    - Disaster Risk Reduction: disaster-risk-reduction.md
  - Career:
    - Career & Jobs: career-jobs.md
    - Scholarships & Grants: scholarships-grants.md
  - Other:
    - Tanzania Resources: tanzania-resources.md
    - Everyday Tools: everyday-tools.md
    - Entertainment: entertainment.md

extra_css:
  - stylesheets/extra.css

copyright: Copyright &copy; 2025 Christina Mapunda
